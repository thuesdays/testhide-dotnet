name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test gate (conformance must pass before publish)
        run: |
          dotnet build tests/SampleTests/SampleTests.csproj -c Release
          dotnet test tests/SampleTests/SampleTests.csproj -c Release --no-build \
            --logger "testhide;LogFilePath=${{ github.workspace }}/sample-report.xml" || true
          python conformance/validate_report.py "${{ github.workspace }}/sample-report.xml"
          python conformance/validate_report.py conformance/golden_report.xml

      - name: Pack
        run: |
          V="${{ github.event.inputs.version }}"
          dotnet pack src/Testhide.Reporting.Core/Testhide.Reporting.Core.csproj   -c Release -o artifacts -p:Version=$V
          dotnet pack src/Testhide.Reporting.VSTest/Testhide.Reporting.VSTest.csproj -c Release -o artifacts -p:Version=$V

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
